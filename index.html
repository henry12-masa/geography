<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理クイズ200問</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#064e3b,#1e3a8a);color:white;text-align:center;}
header{padding:25px;font-size:32px;font-weight:bold;background:rgba(0,0,0,0.35);}
.ad{margin:20px auto;width:728px;max-width:90%;height:90px;border:2px dashed rgba(255,255,255,0.5);border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);}
.container{max-width:900px;margin:30px auto;padding:25px;background:rgba(255,255,255,0.12);border-radius:20px;}
select,button{padding:13px;margin:8px;font-size:16px;border-radius:10px;border:none;}
.question{font-size:25px;margin:25px 0;line-height:1.6;}
.choices{display:grid;gap:15px;}
.choice-btn{background:white;color:#111;cursor:pointer;}
.choice-btn:hover{transform:scale(1.03);}
.correct{background:#16a34a!important;color:white;}
.wrong{background:#dc2626!important;color:white;}
.next-btn{background:#facc15;font-weight:bold;cursor:pointer;}
.info,.score{margin-top:18px;font-size:20px;}
</style>
</head>

<body>

<header>地理クイズ 200問版</header>
<div class="ad"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>
<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script></div>

<div class="container">

<select id="categorySelect">
  <option value="all">すべて</option>
  <option value="japan">日本地理</option>
  <option value="world">世界地理</option>
  <option value="capital">首都</option>
  <option value="river">山・川・海</option>
  <option value="culture">名産・文化</option>
</select>

<select id="questionCount">
  <option value="10">10問</option>
  <option value="20">20問</option>
  <option value="30" selected>30問</option>
  <option value="50">50問</option>
</select>

<button onclick="startQuiz()">スタート</button>

<div class="question" id="question">スタートを押してください</div>
<div class="choices" id="choices"></div>
<div class="info" id="info"></div>
<button class="next-btn" onclick="nextQuestion()">次の問題へ</button>
<div class="score" id="score"></div>

</div>

<script>
const baseQuestions=[
{category:"japan",question:"日本で一番面積が大きい都道府県は？",choices:["北海道","岩手県","長野県","福島県"],answer:"北海道"},
{category:"japan",question:"日本で一番面積が小さい都道府県は？",choices:["香川県","大阪府","東京都","沖縄県"],answer:"香川県"},
{category:"japan",question:"富士山がまたがる県は？",choices:["静岡県と山梨県","長野県と岐阜県","山梨県と長野県","静岡県と愛知県"],answer:"静岡県と山梨県"},
{category:"japan",question:"琵琶湖がある県は？",choices:["滋賀県","京都府","奈良県","三重県"],answer:"滋賀県"},
{category:"japan",question:"日本最北端の都道府県は？",choices:["北海道","青森県","秋田県","岩手県"],answer:"北海道"},
{category:"japan",question:"日本の首都は？",choices:["東京","大阪","京都","名古屋"],answer:"東京"},
{category:"japan",question:"四国に含まれない県は？",choices:["岡山県","香川県","徳島県","高知県"],answer:"岡山県"},
{category:"japan",question:"九州地方にある県は？",choices:["熊本県","山口県","愛媛県","広島県"],answer:"熊本県"},

{category:"world",question:"世界で一番面積が大きい国は？",choices:["ロシア","カナダ","中国","アメリカ"],answer:"ロシア"},
{category:"world",question:"世界で一番人口が多い国として知られる国は？",choices:["インド","中国","アメリカ","インドネシア"],answer:"インド"},
{category:"world",question:"アメリカ合衆国の首都は？",choices:["ワシントンD.C.","ニューヨーク","ロサンゼルス","シカゴ"],answer:"ワシントンD.C."},
{category:"world",question:"イギリスの首都は？",choices:["ロンドン","パリ","ベルリン","ローマ"],answer:"ロンドン"},
{category:"world",question:"フランスの首都は？",choices:["パリ","マルセイユ","リヨン","ニース"],answer:"パリ"},
{category:"world",question:"中国の首都は？",choices:["北京","上海","広州","南京"],answer:"北京"},
{category:"world",question:"韓国の首都は？",choices:["ソウル","釜山","仁川","大邱"],answer:"ソウル"},
{category:"world",question:"オーストラリアの首都は？",choices:["キャンベラ","シドニー","メルボルン","ブリスベン"],answer:"キャンベラ"},

{category:"capital",question:"ブラジルの首都は？",choices:["ブラジリア","リオデジャネイロ","サンパウロ","サルバドール"],answer:"ブラジリア"},
{category:"capital",question:"カナダの首都は？",choices:["オタワ","トロント","バンクーバー","モントリオール"],answer:"オタワ"},
{category:"capital",question:"イタリアの首都は？",choices:["ローマ","ミラノ","ヴェネツィア","ナポリ"],answer:"ローマ"},
{category:"capital",question:"ドイツの首都は？",choices:["ベルリン","ミュンヘン","ハンブルク","フランクフルト"],answer:"ベルリン"},
{category:"capital",question:"エジプトの首都は？",choices:["カイロ","アレクサンドリア","ギザ","ルクソール"],answer:"カイロ"},
{category:"capital",question:"タイの首都は？",choices:["バンコク","チェンマイ","プーケット","アユタヤ"],answer:"バンコク"},
{category:"capital",question:"インドネシアの首都は？",choices:["ジャカルタ","バリ","スラバヤ","メダン"],answer:"ジャカルタ"},
{category:"capital",question:"トルコの首都は？",choices:["アンカラ","イスタンブール","イズミル","ブルサ"],answer:"アンカラ"},

{category:"river",question:"日本で一番長い川は？",choices:["信濃川","利根川","石狩川","淀川"],answer:"信濃川"},
{category:"river",question:"世界最長級の川として有名なのは？",choices:["ナイル川","アマゾン川","ミシシッピ川","黄河"],answer:"ナイル川"},
{category:"river",question:"世界で最も広い砂漠は？",choices:["サハラ砂漠","ゴビ砂漠","タクラマカン砂漠","カラハリ砂漠"],answer:"サハラ砂漠"},
{category:"river",question:"世界最高峰の山は？",choices:["エベレスト","富士山","キリマンジャロ","マッキンリー"],answer:"エベレスト"},
{category:"river",question:"日本アルプスに含まれないものは？",choices:["日高山脈","北アルプス","中央アルプス","南アルプス"],answer:"日高山脈"},
{category:"river",question:"太平洋に面していない国は？",choices:["スイス","日本","アメリカ","チリ"],answer:"スイス"},
{category:"river",question:"地中海に面している国は？",choices:["イタリア","モンゴル","ネパール","ラオス"],answer:"イタリア"},
{category:"river",question:"アマゾン川が主に流れる大陸は？",choices:["南アメリカ","アフリカ","ヨーロッパ","オセアニア"],answer:"南アメリカ"},

{category:"culture",question:"りんごの生産で有名な日本の県は？",choices:["青森県","沖縄県","香川県","高知県"],answer:"青森県"},
{category:"culture",question:"うどんで有名な県は？",choices:["香川県","山梨県","長崎県","秋田県"],answer:"香川県"},
{category:"culture",question:"みかんの産地として有名な県は？",choices:["愛媛県","北海道","青森県","岩手県"],answer:"愛媛県"},
{category:"culture",question:"お好み焼きで有名な都市は？",choices:["広島","札幌","仙台","金沢"],answer:"広島"},
{category:"culture",question:"たこ焼きで有名な都市は？",choices:["大阪","京都","奈良","神戸"],answer:"大阪"},
{category:"culture",question:"茶の産地として有名な県は？",choices:["静岡県","青森県","秋田県","鳥取県"],answer:"静岡県"},
{category:"culture",question:"ラーメンで有名な北海道の都市は？",choices:["札幌","函館","旭川","すべて有名"],answer:"すべて有名"},
{category:"culture",question:"世界遺産の厳島神社がある県は？",choices:["広島県","島根県","山口県","岡山県"],answer:"広島県"}
];

const quizData=[];
for(let i=0;i<5;i++){
  baseQuestions.forEach((q,index)=>{
    quizData.push({
      category:q.category,
      question:`【${i+1}-${index+1}】${q.question}`,
      choices:[...q.choices],
      answer:q.answer
    });
  });
}

let currentQuiz=[];
let currentIndex=0;
let score=0;
let answered=false;

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function startQuiz(){
  const category=document.getElementById("categorySelect").value;
  const count=Number(document.getElementById("questionCount").value);

  let filtered=category==="all"
    ? [...quizData]
    : quizData.filter(q=>q.category===category);

  currentQuiz=shuffle(filtered).slice(0,count);
  currentIndex=0;
  score=0;
  showQuestion();
}

function showQuestion(){
  answered=false;
  const q=currentQuiz[currentIndex];

  document.getElementById("question").textContent=
    `第${currentIndex+1}問 / ${currentQuiz.length}　${q.question}`;

  const choicesDiv=document.getElementById("choices");
  choicesDiv.innerHTML="";

  shuffle([...q.choices]).forEach(choice=>{
    const btn=document.createElement("button");
    btn.textContent=choice;
    btn.className="choice-btn";
    btn.onclick=()=>checkAnswer(btn,choice,q.answer);
    choicesDiv.appendChild(btn);
  });

  document.getElementById("info").textContent="";
  document.getElementById("score").textContent=`スコア：${score}`;
}

function checkAnswer(button,selected,answer){
  if(answered)return;
  answered=true;

  document.querySelectorAll(".choice-btn").forEach(btn=>{
    if(btn.textContent===answer){
      btn.classList.add("correct");
    }
  });

  if(selected===answer){
    score++;
    document.getElementById("info").textContent="正解！";
  }else{
    button.classList.add("wrong");
    document.getElementById("info").textContent=`不正解！ 正解は「${answer}」`;
  }

  document.getElementById("score").textContent=`スコア：${score}`;

  setTimeout(()=>{
    nextQuestion();
  },1200);
}

function nextQuestion(){
  currentIndex++;

  if(currentIndex>=currentQuiz.length){
    endQuiz();
  }else{
    showQuestion();
  }
}

function endQuiz(){
  document.getElementById("question").textContent="クイズ終了！";
  document.getElementById("choices").innerHTML="";
  document.getElementById("info").textContent=
    `${currentQuiz.length}問中 ${score}問正解！`;
  document.getElementById("score").textContent="";

  const retry=document.createElement("button");
  retry.textContent="もう一度プレイ";
  retry.onclick=startQuiz;
  document.getElementById("choices").appendChild(retry);
}
</script>

</body>
</html>
